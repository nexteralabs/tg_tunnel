name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync --group dev
      - run: uv run ruff check src/
      - run: uv run ruff format --check src/

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev
      - name: Run tests with coverage
        run: uv run pytest tests/ -q --cov=tg_tunnel --cov-report=xml --cov-report=term-missing
      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync --group dev
      - run: uv run mypy src/tg_tunnel --ignore-missing-imports --no-error-summary

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync --group dev
      - name: Audit dependencies for known vulnerabilities
        run: uv run pip-audit -r <(uv export --no-dev --no-emit-project --format requirements-txt)

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t tg-tunnel:ci .
      - name: Verify image starts (smoke test)
        run: |
          docker run --rm \
            -e TELEGRAM_BOT_TOKEN=00000000:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA \
            -e TELEGRAM_TARGET_CHAT_ID=-100000000000 \
            -e DATABASE_URL=postgresql+psycopg://u:p@localhost/db \
            -e CALLBACK_SIGNING_SECRET=strong-signing-secret-32-chars!! \
            -e TELEGRAM_WEBHOOK_SECRET=strong-webhook-secret-32-chars!! \
            tg-tunnel:ci uv run --no-sync python -c "from tg_tunnel.core.config import Settings; print('config OK')"

  build:
    name: Build & Push Image
    needs: [lint, test, typecheck, security, docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Bump patch version
        id: bump
        run: |
          IMAGE_PATH="ghcr.io/${{ github.repository_owner }}/tg-tunnel"
          echo "image_path=${IMAGE_PATH,,}" >> $GITHUB_OUTPUT
          CURRENT=$(grep -m1 '^version' pyproject.toml | sed 's/version = "//;s/"//')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          sed -i "s/^version = \"${CURRENT}\"/version = \"${VERSION}\"/" pyproject.toml
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git pull --rebase origin main
          git push

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.bump.outputs.image_path }}:latest
            ${{ steps.bump.outputs.image_path }}:${{ steps.bump.outputs.version }}

      - name: Make GHCR package public
        run: |
          curl -s -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/orgs/${{ github.repository_owner }}/packages/container/tg-tunnel" \
            -d '{"visibility":"public"}'
