name: Build, Push & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      image: ${{ steps.bump.outputs.image_path }}:${{ steps.bump.outputs.version }}
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}
          fetch-depth: 0

      - name: Bump patch version
        id: bump
        run: |
          IMAGE_PATH="ghcr.io/${{ github.repository_owner }}/tg-tunnel"
          echo "image_path=${IMAGE_PATH,,}" >> $GITHUB_OUTPUT
          CURRENT=$(grep -m1 '^version' pyproject.toml | sed 's/version = "//;s/"//')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          sed -i "s/^version = \"${CURRENT}\"/version = \"${VERSION}\"/" pyproject.toml
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git pull --rebase origin main
          git push

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.bump.outputs.image_path }}:latest
            ${{ steps.bump.outputs.image_path }}:${{ steps.bump.outputs.version }}

      - name: Make GHCR package public
        run: |
          curl -s -X PATCH \
            -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/orgs/${{ github.repository_owner }}/packages/container/tg-tunnel" \
            -d '{"visibility":"public"}'

  notify:
    needs: build-push
    runs-on: self-hosted
    steps:
      - name: Notify SRE Agent
        shell: powershell
        env:
          IMAGE:                    ${{ needs.build-push.outputs.image }}
          SHA:                      ${{ github.sha }}
          REPO:                     ${{ github.repository }}
          REF:                      ${{ github.ref_name }}
          SRE_URL:                  ${{ vars.SRE_AGENT_URL }}
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_TARGET_CHAT_ID:  ${{ secrets.TELEGRAM_TARGET_CHAT_ID }}
          TELEGRAM_WEBHOOK_SECRET:  ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          DATABASE_URL:             ${{ secrets.DATABASE_URL }}
          CALLBACK_SIGNING_SECRET:  ${{ secrets.CALLBACK_SIGNING_SECRET }}
          TELEGRAM_MESSAGE_PARSE_MODE: ${{ vars.TELEGRAM_MESSAGE_PARSE_MODE }}
          TELEGRAM_USE_WEBHOOK:     ${{ vars.TELEGRAM_USE_WEBHOOK }}
          PUBLIC_WEBHOOK_URL:       ${{ vars.PUBLIC_WEBHOOK_URL }}
          CLEAN_ON_BOOT:            ${{ vars.CLEAN_ON_BOOT }}
        run: |
          $payload = @{
            repo  = $env:REPO
            image = $env:IMAGE
            sha   = $env:SHA
            ref   = $env:REF
            env   = @{
              TELEGRAM_BOT_TOKEN          = $env:TELEGRAM_BOT_TOKEN
              TELEGRAM_TARGET_CHAT_ID     = $env:TELEGRAM_TARGET_CHAT_ID
              TELEGRAM_WEBHOOK_SECRET     = $env:TELEGRAM_WEBHOOK_SECRET
              DATABASE_URL                = $env:DATABASE_URL
              CALLBACK_SIGNING_SECRET     = $env:CALLBACK_SIGNING_SECRET
              TELEGRAM_MESSAGE_PARSE_MODE = $env:TELEGRAM_MESSAGE_PARSE_MODE
              TELEGRAM_USE_WEBHOOK        = $env:TELEGRAM_USE_WEBHOOK
              PUBLIC_WEBHOOK_URL          = $env:PUBLIC_WEBHOOK_URL
              CLEAN_ON_BOOT               = $env:CLEAN_ON_BOOT
            }
          } | ConvertTo-Json -Compress -Depth 5

          Write-Host "Notifying SRE Agent at $env:SRE_URL/deploy"
          $response = Invoke-RestMethod -Method POST -Uri "$env:SRE_URL/deploy" -ContentType "application/json" -Body $payload
          Write-Host "Response: $($response | ConvertTo-Json)"
