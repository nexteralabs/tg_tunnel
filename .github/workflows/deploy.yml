name: Build, Push & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      image: ${{ steps.bump.outputs.image_path }}:${{ steps.bump.outputs.version }}
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}
          fetch-depth: 0

      - name: Bump patch version
        id: bump
        run: |
          IMAGE_PATH="ghcr.io/${{ github.repository_owner }}/tg-gateway"
          echo "image_path=${IMAGE_PATH,,}" >> $GITHUB_OUTPUT
          CURRENT=$(grep -m1 '^version' pyproject.toml | sed 's/version = "//;s/"//')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          sed -i "s/^version = \"${CURRENT}\"/version = \"${VERSION}\"/" pyproject.toml
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git pull --rebase origin main
          git push

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.bump.outputs.image_path }}:latest
            ${{ steps.bump.outputs.image_path }}:${{ steps.bump.outputs.version }}

      - name: Make GHCR package public
        run: |
          curl -s -X PATCH \
            -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/orgs/${{ github.repository_owner }}/packages/container/tg-gateway" \
            -d '{"visibility":"public"}'

  notify:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to tg_gateway_notify
        run: |
          gh api repos/NexteraLabs/tg_gateway_notify/dispatches \
            --method POST \
            -f event_type=tg-gateway-deploy \
            -f "client_payload[image]=${{ needs.build-push.outputs.image }}" \
            -f "client_payload[sha]=${{ github.sha }}" \
            -f "client_payload[repo]=${{ github.repository }}" \
            -f "client_payload[ref]=${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.NOTIFY_DISPATCH_TOKEN }}
