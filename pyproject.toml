[tool.poetry]
name = "tg-prompt-api"
version = "0.1.0"
description = "Generic ask/collect/notify Telegram prompt API with FastAPI + aiogram + Postgres"
authors = ["You <you@example.com>"]
readme = "README.md"
packages = [{ include = "tg_prompt_api", from = "src" }]

[tool.poetry.dependencies]
python = ">=3.11,<3.13"
fastapi = "^0.115.0"
uvicorn = {version = "^0.30.0", extras=["standard"]}
aiogram = "^3.13.1"
httpx = "^0.27.0"
psycopg = {version = "^3.2.1", extras=["binary"]}
pydantic = "^2.9.0"
pydantic-settings = "^2.5.2"
tenacity = "^9.0.0"
python-dotenv = "^1.0.1"
typer = "^0.12.5"
ulid-py = "^1.1.0"

[tool.poetry.group.dev.dependencies]
pytest = "^8.3.2"
ruff = "^0.6.7"

[tool.ruff]
line-length = 100

[tool.poetry.scripts]
prompt-cli = "tg_prompt_api.cli:app"
