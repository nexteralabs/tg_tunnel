version: "3.9"
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tg_prompt_api
    ports: ["5432:5432"]
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/00_init.sql:ro

  adminer:
    image: adminer:4
    restart: unless-stopped
    ports: ["8081:8080"]

volumes:
  db_data:
