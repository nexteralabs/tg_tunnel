services:
  api:
    image: ghcr.io/nexteralabs/telegram_prompt_api:${IMAGE_TAG:-latest}
    container_name: telegram-prompt-api
    restart: unless-stopped
    ports: ["8100:8100"]
    env_file: .env
    extra_hosts: ["host.docker.internal:host-gateway"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8100/channels"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
