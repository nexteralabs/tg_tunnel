services:
  api:
    build: .
    restart: unless-stopped
    ports: ["8100:8100"]
    env_file: .env
    environment:
      # Override DATABASE_URL to reach host Postgres from inside the container
      # (env_file uses localhost, but inside Docker that means the container itself)
      DATABASE_URL: ${DATABASE_URL_DOCKER}
    extra_hosts: ["host.docker.internal:host-gateway"]
