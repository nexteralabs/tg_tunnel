app:
  name: telegram-prompt-api
  image: ghcr.io/nexteralabs/telegram_prompt_api:latest

deploy:
  env_file: .env

health:
  checks:
    - name: api-channels
      url: http://localhost:8100/channels
      method: GET
      expect_status: 200
  interval: 30s
  grace_period: 15s
  failure_threshold: 3

monitoring:
  sources:
    - type: docker_logs
      container: telegram-prompt-api
    - type: http
      url: http://localhost:8100/channels
      interval: 60s

  rules:
    - name: error_spike
      source: docker_logs
      pattern: "ERROR|CRITICAL|Exception|Traceback"
      window: 5m
      threshold: "> 5"
      severity: critical

    - name: polling_failure
      source: docker_logs
      pattern: "TelegramNetworkError|polling.*failed|Failed to poll|getUpdates.*failed"
      window: 10m
      threshold: "> 3"
      severity: warning

rollback:
  enabled: true
  strategy: previous_image

alerts:
  on_deploy: true
  on_failure: true
  on_rollback: true
  channels:
    - telegram
